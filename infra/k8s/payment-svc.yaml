apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-svc
  namespace: securebank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-svc
  template:
    metadata:
      labels:
        app: payment-svc
    spec:
      containers:
        - name: payment-svc
          image: itsmeynr/securebank-payment-svc:latest
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: payment-svc
  namespace: securebank
spec:
  selector:
    app: payment-svc
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
