apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-svc
  namespace: securebank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notify-svc
  template:
    metadata:
      labels:
        app: notify-svc
    spec:
      containers:
        - name: notify-svc
          image: itsmeynr/securebank-notify-svc:latest
          ports:
            - containerPort: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: notify-svc
  namespace: securebank
spec:
  selector:
    app: notify-svc
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
