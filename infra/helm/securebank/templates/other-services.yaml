apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.fraudSvc.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.fraudSvc.name }}
spec:
  replicas: {{ .Values.services.fraudSvc.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.fraudSvc.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.fraudSvc.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.services.fraudSvc.name }}
          image: {{ .Values.global.imageRegistry }}/{{ .Values.services.fraudSvc.image }}:{{ .Values.services.fraudSvc.tag }}
          ports:
            - containerPort: {{ .Values.services.fraudSvc.port }}
          resources:
            {{- toYaml .Values.services.fraudSvc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.fraudSvc.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.services.fraudSvc.name }}
  ports:
    - port: {{ .Values.services.fraudSvc.port }}
      targetPort: {{ .Values.services.fraudSvc.port }}
  type: ClusterIP
---
