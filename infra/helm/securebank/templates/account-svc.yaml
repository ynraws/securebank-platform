apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.accountSvc.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.accountSvc.name }}
    {{- include "securebank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.accountSvc.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.accountSvc.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.accountSvc.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.services.accountSvc.name }}
          image: {{ .Values.global.imageRegistry }}/{{ .Values.services.accountSvc.image }}:{{ .Values.services.accountSvc.tag }}
          ports:
            - containerPort: {{ .Values.services.accountSvc.port }}
          env:
            - name: DATABASE_URL
              value: {{ .Values.services.accountSvc.env.DATABASE_URL }}
          resources:
            {{- toYaml .Values.services.accountSvc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.accountSvc.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.services.accountSvc.name }}
  ports:
    - port: {{ .Values.services.accountSvc.port }}
      targetPort: {{ .Values.services.accountSvc.port }}
  type: ClusterIP
