apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.paymentSvc.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.paymentSvc.name }}
    {{- include "securebank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.paymentSvc.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.paymentSvc.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.paymentSvc.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.services.paymentSvc.name }}
          image: {{ .Values.global.imageRegistry }}/{{ .Values.services.paymentSvc.image }}:{{ .Values.services.paymentSvc.tag }}
          ports:
            - containerPort: {{ .Values.services.paymentSvc.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.services.paymentSvc.env.SPRING_DATASOURCE_URL }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.services.paymentSvc.env.SPRING_DATASOURCE_USERNAME }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.services.paymentSvc.env.SPRING_DATASOURCE_PASSWORD }}
          resources:
            {{- toYaml .Values.services.paymentSvc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.paymentSvc.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.services.paymentSvc.name }}
  ports:
    - port: {{ .Values.services.paymentSvc.port }}
      targetPort: {{ .Values.services.paymentSvc.port }}
  type: ClusterIP
